version: 1

# Branding
extends:
  # choose between c3s.yml, cams.yml, and ecmwf.yml
  - branding/c3s.yml

project:
  title: Extreme precipitation
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: jkeune/extreme_precip_exposure
  thebe:
    binder:
      repo: jkeune/extreme_precip_exposure
      provider: github
      url: https://mybinder.org
      ref: develop
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - file: tutorials.ipynb
      title: Tutorials
      children:
        - title: Storylines
          children:
            - file: tutorials/changing_hazard.ipynb
        - title: Explore Exposure Data
          children:
            - file: tutorials/population.ipynb
    - file: how-to-guides.ipynb
      title: How-To Guides
      children:
        - file: how-to-guides/define_your_region.ipynb
        - file: how-to-guides/download_data_from_cds.ipynb
        - title: Process Exposure Data
          children:
            - file: how-to-guides/population_ghs.ipynb
        - title: Process Hazard Data
          children:
            - file: how-to-guides/precipitation_c3satlas.ipynb
    - file: explanation.ipynb
      title: Explanation
      children:
        - file: explanation/return_period.md
        - title: Towards Risk Assessments
          children: 
            - file: explanation/hazard.md
            - file: explanation/exposure.md
            - file: explanation/vulnerability.md
            - file: explanation/risk.md

site:
  template: book-theme
  options:
    folders: true
